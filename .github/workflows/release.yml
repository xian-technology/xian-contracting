name: Release

on:
  push:
    tags:
      - "accounts-v*"
      - "contracting-v*"
      - "runtime-types-v*"
      - "compiler-core-v*"
      - "zk-v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-context:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      package_dir: ${{ steps.resolve.outputs.package_dir }}
      project_name: ${{ steps.resolve.outputs.project_name }}
      release_name: ${{ steps.resolve.outputs.release_name }}
      version: ${{ steps.resolve.outputs.version }}
      pypi_environment: ${{ steps.resolve.outputs.pypi_environment }}
      pypi_url: ${{ steps.resolve.outputs.pypi_url }}
      needs_rust: ${{ steps.resolve.outputs.needs_rust }}
    steps:
      - name: Resolve package from tag
        id: resolve
        run: |
          tag="${GITHUB_REF_NAME}"

          case "${tag}" in
            accounts-v*)
              version="${tag#accounts-v}"
              package_dir="packages/xian-accounts"
              project_name="xian-tech-accounts"
              pypi_environment="pypi-xian-accounts"
              needs_rust="false"
              ;;
            contracting-v*)
              version="${tag#contracting-v}"
              package_dir="."
              project_name="xian-tech-contracting"
              pypi_environment="pypi-xian-contracting"
              needs_rust="false"
              ;;
            runtime-types-v*)
              version="${tag#runtime-types-v}"
              package_dir="packages/xian-runtime-types"
              project_name="xian-tech-runtime-types"
              pypi_environment="pypi-xian-runtime-types"
              needs_rust="false"
              ;;
            compiler-core-v*)
              version="${tag#compiler-core-v}"
              package_dir="packages/xian-compiler-core"
              project_name="xian-tech-compiler-core"
              pypi_environment="pypi-xian-compiler-core"
              needs_rust="true"
              ;;
            zk-v*)
              version="${tag#zk-v}"
              package_dir="packages/xian-zk"
              project_name="xian-tech-zk"
              pypi_environment="pypi-xian-zk"
              needs_rust="true"
              ;;
            *)
              echo "Unsupported release tag: ${tag}" >&2
              exit 1
              ;;
          esac

          {
            echo "package_dir=${package_dir}"
            echo "project_name=${project_name}"
            echo "release_name=${project_name} ${version}"
            echo "version=${version}"
            echo "pypi_environment=${pypi_environment}"
            echo "pypi_url=https://pypi.org/p/${project_name}"
            echo "needs_rust=${needs_rust}"
          } >> "${GITHUB_OUTPUT}"

  validate:
    needs: release-context
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        run: python -m pip install uv

      - name: Ensure Rust toolchain is available
        run: |
          if ! command -v cargo >/dev/null 2>&1; then
            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
            echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"
          fi
          cargo --version

      - name: Install wasm-pack
        run: |
          if ! command -v wasm-pack >/dev/null 2>&1; then
            cargo install wasm-pack --version 0.14.0 --locked
          fi
          wasm-pack --version

      - name: Run release validation
        run: ./scripts/validate-release.sh

  build-python:
    needs:
      - release-context
      - validate
    if: needs.release-context.outputs.needs_rust == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: |
          package_dir="${{ needs.release-context.outputs.package_dir }}"
          cd "${package_dir}"
          python -m build

      - name: Verify built version matches tag
        run: |
          package_dir="${{ needs.release-context.outputs.package_dir }}"
          expected="${{ needs.release-context.outputs.version }}"
          python - <<'PY'
          import os
          import pathlib
          import sys

          package_dir = pathlib.Path(os.environ["PACKAGE_DIR"])
          expected = os.environ["EXPECTED_VERSION"]
          dist_dir = package_dir / "dist"
          files = [path.name for path in dist_dir.iterdir() if path.is_file()]
          if not files:
              raise SystemExit(f"No distribution artifacts were built in {dist_dir}")
          if not all(expected in name for name in files):
              raise SystemExit(
                  f"Built artifacts do not match tag version {expected}: {files}"
              )
          PY
        env:
          PACKAGE_DIR: ${{ needs.release-context.outputs.package_dir }}
          EXPECTED_VERSION: ${{ needs.release-context.outputs.version }}

      - name: Stage release artifacts
        run: |
          package_dir="${{ needs.release-context.outputs.package_dir }}"
          mkdir -p /tmp/release-dist
          cp "${package_dir}"/dist/* /tmp/release-dist/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-dist-python
          path: /tmp/release-dist/*
          if-no-files-found: error
          retention-days: 14

  build-rust-sdist:
    needs:
      - release-context
      - validate
    if: needs.release-context.outputs.needs_rust == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Ensure Rust toolchain is available
        run: |
          if ! command -v cargo >/dev/null 2>&1; then
            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
            echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"
          fi
          cargo --version

      - name: Install build tooling
        run: python -m pip install --upgrade maturin

      - name: Build source distribution
        run: |
          package_dir="${{ needs.release-context.outputs.package_dir }}"
          mkdir -p dist
          maturin sdist \
            --out dist \
            --manifest-path "${package_dir}/Cargo.toml"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-dist-rust-sdist
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  build-rust-wheels:
    needs:
      - release-context
      - validate
    if: needs.release-context.outputs.needs_rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15-intel
          - macos-14
          - windows-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: >-
            --release
            --out dist
            --manifest-path ${{ needs.release-context.outputs.package_dir }}/Cargo.toml
            --features python-extension
          manylinux: auto

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-dist-rust-wheel-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  collect-release-artifacts:
    needs:
      - release-context
      - validate
      - build-python
      - build-rust-sdist
      - build-rust-wheels
    if: |
      always() &&
      needs.release-context.result == 'success' &&
      needs.validate.result == 'success' &&
      (needs.build-python.result == 'success' || needs.build-python.result == 'skipped') &&
      (needs.build-rust-sdist.result == 'success' || needs.build-rust-sdist.result == 'skipped') &&
      (needs.build-rust-wheels.result == 'success' || needs.build-rust-wheels.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: release-dist-*
          path: dist
          merge-multiple: true

      - name: Verify built version matches tag
        run: |
          expected="${{ needs.release-context.outputs.version }}"
          python - <<'PY'
          import os
          import pathlib

          expected = os.environ["EXPECTED_VERSION"]
          dist_dir = pathlib.Path("dist")
          files = sorted(path.name for path in dist_dir.iterdir() if path.is_file())
          if not files:
              raise SystemExit(f"No distribution artifacts were collected in {dist_dir}")
          if not all(expected in name for name in files):
              raise SystemExit(
                  f"Built artifacts do not match tag version {expected}: {files}"
              )
          print("Collected release artifacts:")
          for name in files:
              print(f"  {name}")
          PY
        env:
          EXPECTED_VERSION: ${{ needs.release-context.outputs.version }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-dist
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish:
    needs:
      - release-context
      - collect-release-artifacts
    if: needs.collect-release-artifacts.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: ${{ needs.release-context.outputs.pypi_environment }}
      url: ${{ needs.release-context.outputs.pypi_url }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs:
      - release-context
      - collect-release-artifacts
      - publish
    if: needs.publish.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-dist
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --title "${{ needs.release-context.outputs.release_name }}" \
            --generate-notes
