name: Release

on:
  push:
    tags:
      - "accounts-v*"
      - "contracting-v*"
      - "runtime-types-v*"
      - "compiler-core-v*"
      - "zk-v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-context:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      package_dir: ${{ steps.resolve.outputs.package_dir }}
      project_name: ${{ steps.resolve.outputs.project_name }}
      release_name: ${{ steps.resolve.outputs.release_name }}
      version: ${{ steps.resolve.outputs.version }}
      pypi_environment: ${{ steps.resolve.outputs.pypi_environment }}
      pypi_url: ${{ steps.resolve.outputs.pypi_url }}
      has_npm_package: ${{ steps.resolve.outputs.has_npm_package }}
      npm_package_dir: ${{ steps.resolve.outputs.npm_package_dir }}
      npm_package_name: ${{ steps.resolve.outputs.npm_package_name }}
      npm_environment: ${{ steps.resolve.outputs.npm_environment }}
      npm_url: ${{ steps.resolve.outputs.npm_url }}
      needs_rust: ${{ steps.resolve.outputs.needs_rust }}
    steps:
      - name: Resolve package from tag
        id: resolve
        run: |
          tag="${GITHUB_REF_NAME}"
          has_npm_package="false"
          npm_package_dir=""
          npm_package_name=""
          npm_environment=""
          npm_url=""

          case "${tag}" in
            accounts-v*)
              version="${tag#accounts-v}"
              package_dir="packages/xian-accounts"
              project_name="xian-tech-accounts"
              pypi_environment="pypi-xian-accounts"
              needs_rust="false"
              ;;
            contracting-v*)
              version="${tag#contracting-v}"
              package_dir="."
              project_name="xian-tech-contracting"
              pypi_environment="pypi-xian-contracting"
              needs_rust="false"
              ;;
            runtime-types-v*)
              version="${tag#runtime-types-v}"
              package_dir="packages/xian-runtime-types"
              project_name="xian-tech-runtime-types"
              pypi_environment="pypi-xian-runtime-types"
              needs_rust="false"
              ;;
            compiler-core-v*)
              version="${tag#compiler-core-v}"
              package_dir="packages/xian-compiler-core"
              project_name="xian-tech-compiler-core"
              pypi_environment="pypi-xian-compiler-core"
              needs_rust="true"
              has_npm_package="true"
              npm_package_dir="packages/xian-compiler-core/npm"
              npm_package_name="@xian-tech/compiler"
              npm_environment="npm"
              npm_url="https://www.npmjs.com/package/@xian-tech/compiler"
              ;;
            zk-v*)
              version="${tag#zk-v}"
              package_dir="packages/xian-zk"
              project_name="xian-tech-zk"
              pypi_environment="pypi-xian-zk"
              needs_rust="true"
              ;;
            *)
              echo "Unsupported release tag: ${tag}" >&2
              exit 1
              ;;
          esac

          {
            echo "package_dir=${package_dir}"
            echo "project_name=${project_name}"
            echo "release_name=${project_name} ${version}"
            echo "version=${version}"
            echo "pypi_environment=${pypi_environment}"
            echo "pypi_url=https://pypi.org/p/${project_name}"
            echo "has_npm_package=${has_npm_package}"
            echo "npm_package_dir=${npm_package_dir}"
            echo "npm_package_name=${npm_package_name}"
            echo "npm_environment=${npm_environment}"
            echo "npm_url=${npm_url}"
            echo "needs_rust=${needs_rust}"
          } >> "${GITHUB_OUTPUT}"

  validate:
    needs: release-context
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        run: python -m pip install uv

      - name: Ensure Rust toolchain is available
        run: |
          if ! command -v cargo >/dev/null 2>&1; then
            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
            echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"
          fi
          cargo --version

      - name: Install wasm-pack
        run: |
          if ! command -v wasm-pack >/dev/null 2>&1; then
            cargo install wasm-pack --version 0.14.0 --locked
          fi
          wasm-pack --version

      - name: Run release validation
        run: ./scripts/validate-release.sh

  build-python:
    needs:
      - release-context
      - validate
    if: needs.release-context.outputs.needs_rust == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: |
          package_dir="${{ needs.release-context.outputs.package_dir }}"
          cd "${package_dir}"
          python -m build

      - name: Verify built version matches tag
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          def python_dist_version(version):
              match = re.fullmatch(r"(\d+\.\d+\.\d+)-(alpha|beta|rc)\.(\d+)", version)
              if not match:
                  return version
              marker = {"alpha": "a", "beta": "b", "rc": "rc"}[match.group(2)]
              return f"{match.group(1)}{marker}{match.group(3)}"

          package_dir = pathlib.Path(os.environ["PACKAGE_DIR"])
          expected = os.environ["EXPECTED_VERSION"]
          accepted = {expected, python_dist_version(expected)}
          dist_dir = package_dir / "dist"
          files = [path.name for path in dist_dir.iterdir() if path.is_file()]
          if not files:
              raise SystemExit(f"No distribution artifacts were built in {dist_dir}")
          if not all(any(version in name for version in accepted) for name in files):
              raise SystemExit(
                  f"Built artifacts do not match tag version {expected}: {files}"
              )
          PY
        env:
          PACKAGE_DIR: ${{ needs.release-context.outputs.package_dir }}
          EXPECTED_VERSION: ${{ needs.release-context.outputs.version }}

      - name: Stage release artifacts
        run: |
          package_dir="${{ needs.release-context.outputs.package_dir }}"
          mkdir -p /tmp/release-dist
          cp "${package_dir}"/dist/* /tmp/release-dist/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-dist-python
          path: /tmp/release-dist/*
          if-no-files-found: error
          retention-days: 14

  build-rust-sdist:
    needs:
      - release-context
      - validate
    if: needs.release-context.outputs.needs_rust == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Ensure Rust toolchain is available
        run: |
          if ! command -v cargo >/dev/null 2>&1; then
            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
            echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"
          fi
          cargo --version

      - name: Install build tooling
        run: python -m pip install --upgrade maturin

      - name: Build source distribution
        run: |
          package_dir="${{ needs.release-context.outputs.package_dir }}"
          mkdir -p dist
          maturin sdist \
            --out dist \
            --manifest-path "${package_dir}/Cargo.toml"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-dist-rust-sdist
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  build-rust-wheels:
    needs:
      - release-context
      - validate
    if: needs.release-context.outputs.needs_rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15-intel
          - macos-14
          - windows-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: >-
            --release
            --out dist
            --manifest-path ${{ needs.release-context.outputs.package_dir }}/Cargo.toml
            --features python-extension
          manylinux: auto

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-dist-rust-wheel-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  build-npm-compiler:
    needs:
      - release-context
      - validate
    if: always() && needs.release-context.outputs.has_npm_package == 'true' && needs.validate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          if ! command -v wasm-pack >/dev/null 2>&1; then
            cargo install wasm-pack --version 0.14.0 --locked
          fi
          wasm-pack --version

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Build npm package
        run: npm --prefix "${{ needs.release-context.outputs.npm_package_dir }}" run build

      - name: Verify npm package metadata matches tag
        env:
          EXPECTED_NAME: ${{ needs.release-context.outputs.npm_package_name }}
          EXPECTED_VERSION: ${{ needs.release-context.outputs.version }}
          PACKAGE_DIR: ${{ needs.release-context.outputs.npm_package_dir }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const packagePath = path.join(process.env.PACKAGE_DIR, "package.json");
          const pkg = JSON.parse(fs.readFileSync(packagePath, "utf8"));
          if (pkg.name !== process.env.EXPECTED_NAME) {
            throw new Error(`${packagePath} has name ${pkg.name}, expected ${process.env.EXPECTED_NAME}`);
          }
          if (pkg.version !== process.env.EXPECTED_VERSION) {
            throw new Error(`${packagePath} has version ${pkg.version}, expected ${process.env.EXPECTED_VERSION}`);
          }
          NODE

      - name: Pack npm package
        run: |
          package_dir="${{ needs.release-context.outputs.npm_package_dir }}"
          mkdir -p release-dist-npm
          (
            cd "${package_dir}"
            npm pack --pack-destination "${GITHUB_WORKSPACE}/release-dist-npm"
          )

      - name: Upload npm release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: npm-compiler-dist
          path: release-dist-npm/*
          if-no-files-found: error
          retention-days: 14

  collect-release-artifacts:
    needs:
      - release-context
      - validate
      - build-python
      - build-rust-sdist
      - build-rust-wheels
    if: |
      always() &&
      needs.release-context.result == 'success' &&
      needs.validate.result == 'success' &&
      (needs.build-python.result == 'success' || needs.build-python.result == 'skipped') &&
      (needs.build-rust-sdist.result == 'success' || needs.build-rust-sdist.result == 'skipped') &&
      (needs.build-rust-wheels.result == 'success' || needs.build-rust-wheels.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: release-dist-*
          path: dist
          merge-multiple: true

      - name: Verify built version matches tag
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          def python_dist_version(version):
              match = re.fullmatch(r"(\d+\.\d+\.\d+)-(alpha|beta|rc)\.(\d+)", version)
              if not match:
                  return version
              marker = {"alpha": "a", "beta": "b", "rc": "rc"}[match.group(2)]
              return f"{match.group(1)}{marker}{match.group(3)}"

          expected = os.environ["EXPECTED_VERSION"]
          accepted = {expected, python_dist_version(expected)}
          dist_dir = pathlib.Path("dist")
          files = sorted(path.name for path in dist_dir.iterdir() if path.is_file())
          if not files:
              raise SystemExit(f"No distribution artifacts were collected in {dist_dir}")
          if not all(any(version in name for version in accepted) for name in files):
              raise SystemExit(
                  f"Built artifacts do not match tag version {expected}: {files}"
              )
          print("Collected release artifacts:")
          for name in files:
              print(f"  {name}")
          PY
        env:
          EXPECTED_VERSION: ${{ needs.release-context.outputs.version }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-dist
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish:
    needs:
      - release-context
      - collect-release-artifacts
    if: always() && needs.collect-release-artifacts.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: ${{ needs.release-context.outputs.pypi_environment }}
      url: ${{ needs.release-context.outputs.pypi_url }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-npm-compiler:
    needs:
      - release-context
      - build-npm-compiler
    if: always() && needs.release-context.outputs.has_npm_package == 'true' && needs.build-npm-compiler.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: ${{ needs.release-context.outputs.npm_environment }}
      url: ${{ needs.release-context.outputs.npm_url }}
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Download npm release artifacts
        uses: actions/download-artifact@v6
        with:
          name: npm-compiler-dist
          path: release-dist-npm

      - name: Publish compiler package to npm
        run: |
          for package in release-dist-npm/*.tgz; do
            metadata="$(
              tar -xOf "$package" package/package.json \
                | node -e 'let input = ""; process.stdin.on("data", chunk => input += chunk); process.stdin.on("end", () => { const pkg = JSON.parse(input); console.log(pkg.name + "\t" + pkg.version); });'
            )"
            name="${metadata%%$'\t'*}"
            version="${metadata#*$'\t'}"
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "${name}@${version} is already published; skipping"
              continue
            fi
            publish_tag="latest"
            if [[ "${version}" == *"-"* ]]; then
              publish_tag="beta"
            fi
            npm publish "./$package" --provenance --access public --tag "${publish_tag}"
          done

  github-release:
    needs:
      - release-context
      - collect-release-artifacts
      - publish
      - publish-npm-compiler
    if: |
      always() &&
      needs.publish.result == 'success' &&
      (needs.publish-npm-compiler.result == 'success' || needs.publish-npm-compiler.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-dist
          path: dist

      - name: Download npm release artifacts
        if: needs.release-context.outputs.has_npm_package == 'true'
        uses: actions/download-artifact@v6
        with:
          name: npm-compiler-dist
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_flags=()
          if [[ "${GITHUB_REF_NAME}" == *"-"* ]]; then
            release_flags+=(--prerelease)
          fi
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --title "${{ needs.release-context.outputs.release_name }}" \
            --generate-notes \
            "${release_flags[@]}"
