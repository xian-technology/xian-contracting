name: Validate

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Run tests with coverage
        run: uv run pytest --cov=contracting --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: xian-contracting-coverage
          path: coverage.xml

  validate-native:
    runs-on: ubuntu-latest
    env:
      XIAN_WORKSPACE_ROOT: ${{ github.workspace }}/.xian-workspace

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout xian-configs
        uses: actions/checkout@v6
        with:
          repository: xian-technology/xian-configs
          path: .xian-workspace/xian-configs

      - name: Checkout xian-contracts
        uses: actions/checkout@v6
        with:
          repository: xian-technology/xian-contracts
          path: .xian-workspace/xian-contracts

      - name: Checkout xian-stable-protocol
        uses: actions/checkout@v6
        with:
          repository: xian-technology/xian-stable-protocol
          path: .xian-workspace/xian-stable-protocol

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies with native tracer
        run: uv sync --group dev --extra native --extra zk

      - name: Build native tracer crate
        run: cargo check --manifest-path packages/xian-native-tracer/Cargo.toml

      - name: Check zk verifier binding crate
        run: cargo check --manifest-path packages/xian-zk/Cargo.toml --features python-extension

      - name: Check VM core binding crate
        run: cargo check --manifest-path packages/xian-vm-core/Cargo.toml --features python-extension

      - name: Run zk verifier Rust tests
        run: cargo test --manifest-path packages/xian-zk/Cargo.toml --no-default-features

      - name: Run zk verifier Python tests
        run: |
          cd packages/xian-zk
          uv run pytest -q

      - name: Run native support tests
        run: uv run pytest -q tests/unit/test_tracer.py tests/unit/test_runtime.py tests/unit/test_zk_stdlib.py tests/integration/test_chi_deduction.py

      - name: Run optional native extension tests
        run: uv run pytest -q -m optional_native tests/unit/test_native_tracer.py tests/integration/test_tracer_workloads.py tests/integration/test_zk_bridge.py

      - name: Run native VM tests
        run: uv run --with ./packages/xian-vm-core python -m pytest -q -m optional_native tests/integration/test_vm_language_conformance.py tests/integration/test_vm_metering_audit.py
