[build-system]
requires = ["maturin>=1.13.1,<2"]
build-backend = "maturin"

[project]
name = "xian-tech-vm-core"
version = "0.1.0"
description = "Native VM capability surface for the future Xian execution engine"
readme = "README.md"
license = "MIT"
authors = [{ name = "Xian Network", email = "info@xian.org" }]
requires-python = ">=3.14"
classifiers = [
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Rust",
]
dependencies = ["xian-tech-contracting>=1.0.5,<2"]

[tool.maturin]
module-name = "xian_vm_core._native"
python-source = "python"
features = ["python-extension"]

[tool.uv.sources]
xian-tech-contracting = { path = "../..", editable = true }
