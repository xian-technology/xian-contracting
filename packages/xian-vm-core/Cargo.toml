[package]
name = "xian-vm-core"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Core IR and validation types for the future Xian VM"
repository = "https://github.com/xian-technology/xian-contracting"
homepage = "https://github.com/xian-technology/xian-contracting"

[lib]
name = "xian_vm_core"
crate-type = ["cdylib", "rlib"]

[features]
default = []
python-extension = ["dep:pyo3", "pyo3/extension-module"]

[dependencies]
chrono = { version = "0.4", default-features = false, features = ["std"] }
ed25519-dalek = { version = "2", default-features = false, features = ["std"] }
hex = "0.4"
num-bigint = "0.4"
num-traits = "0.2"
pyo3 = { version = "0.23.5", optional = true, features = ["abi3-py312"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
sha3 = "0.10"

[dev-dependencies]
xian_zk = { package = "xian-zk", path = "../xian-zk" }
