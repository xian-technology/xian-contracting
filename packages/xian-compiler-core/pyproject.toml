[build-system]
requires = ["maturin>=1.13.1,<2"]
build-backend = "maturin"

[project]
name = "xian-tech-compiler-core"
version = "0.1.1"
description = "Shared Rust/WASM compiler core for Xian contracts"
readme = "README.md"
license = "MIT"
authors = [{ name = "Xian Network", email = "info@xian.org" }]
requires-python = ">=3.14"
classifiers = [
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Rust",
]

[tool.maturin]
module-name = "xian_compiler_core._native"
python-source = "python"
features = ["python-extension"]
