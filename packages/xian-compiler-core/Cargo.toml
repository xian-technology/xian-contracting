[package]
name = "xian-compiler-core"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Shared compiler fixture and future Rust/WASM compiler core for Xian"
repository = "https://github.com/xian-technology/xian-contracting"
homepage = "https://github.com/xian-technology/xian-contracting"

[lib]
name = "xian_compiler_core"
crate-type = ["cdylib", "rlib"]

[features]
default = []
python-extension = ["dep:pyo3", "pyo3/extension-module"]
wasm = ["dep:wasm-bindgen"]

[dependencies]
pyo3 = { version = "0.28.3", optional = true, features = ["abi3-py314"] }
rustpython-parser = { version = "0.4", default-features = false, features = ["location", "num-bigint"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
wasm-bindgen = { version = "0.2", optional = true }
