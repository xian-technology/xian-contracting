[build-system]
requires = ["maturin>=1.13.1,<2"]
build-backend = "maturin"

[project]
name = "xian-tech-fastpath-core"
version = "0.1.0"
description = "Optional Rust fast paths for Xian transaction admission"
readme = "README.md"
license = "MIT"
authors = [{ name = "Xian Network", email = "info@xian.org" }]
requires-python = ">=3.14"
classifiers = [
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Rust",
]

[tool.maturin]
module-name = "xian_fastpath_core._native"
python-source = "python"
